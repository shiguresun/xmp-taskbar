name: Build XMPlay Taskbar Plugin (Win10 Fixed)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Build DLL
      run: |
        gcc -shared -o xmp-taskbar.dll main.cpp -lole32 -luuid -lcomctl32 -static

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: xmp-taskbar-dll
        path: xmp-taskbar.dll
