name: Build XMPlay Taskbar Plugin (Win10 Fixed)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build DLL with MSVC
      run: |
        cl /LD main.cpp /Fe:xmp-taskbar.dll ole32.lib uuid.lib comctl32.lib

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: xmp-taskbar-dll
        path: xmp-taskbar.dll
