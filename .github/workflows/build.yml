name: Build XMPlay Taskbar Plugin (Win10 Fixed)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up MSVC environment (Win32)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Build DLL with MSVC (Win32)
      run: |
        cl /LD main.cpp /Fe:xmp-taskbar.dll ole32.lib uuid.lib comctl32.lib user32.lib /link /DEF:xmpdsp.def /MACHINE:X86

    - name: Check DLL exports
      run: dumpbin /exports xmp-taskbar.dll

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: xmp-taskbar-dll
        path: xmp-taskbar.dll
